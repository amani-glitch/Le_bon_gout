<!doctype html>
<html lang="fr" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2032%2032'%3E%3Crect%20width='32'%20height='32'%20rx='7'%20fill='%23c62828'/%3E%3Ctext%20x='16'%20y='22'%20font-family='Georgia,serif'%20font-size='15'%20font-weight='700'%20text-anchor='middle'%20fill='%23ffffff'%3EBG%3C/text%3E%3C/svg%3E"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0d0b0c" />
    <title>Le Bon Goût — Restaurant & pizzeria au feu de bois · Le Bardo</title>
    <meta
      name="description"
      content="Le Bon Goût, Le Bardo : cuisine continentale, spécialités tunisiennes et pizzas au feu de bois. Sur place, à emporter et en livraison. Commandez en ligne."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      // Apply persisted theme before paint to avoid a flash. Le Bon Goût is dark-first.
      (function () {
        try {
          var stored = localStorage.getItem("lebongout-theme");
          var theme = stored || "dark";
          document.documentElement.classList.toggle("dark", theme === "dark");
        } catch (e) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
